<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Form – Clutch Baseball</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="nav-inner">
        <a class="logo-wrap" href="index.html">
            <div class="logo-icon">
                <img src="logo.png" alt="Clutch Baseball" onerror="this.style.display='none'">
            </div>
            Clutch Baseball
        </a>
        <button class="menu-toggle" id="menuBtn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="fall-teams.html">Fall Teams</a></li>
            <li><a href="facilities.html">Facilites</a></li>
            <li><a href="interest-form.html" class="active">Interest Form</a></li>
        </ul>
        <button class="nav-search" aria-label="Search">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </div>
</header>

<main>

    <div class="inner-wrap">
        <h1 style="font-family:'Barlow Condensed',Arial,sans-serif;font-size:clamp(28px,4vw,44px);font-weight:800;color:#073763;letter-spacing:0.04em;margin-bottom:16px;">
            Interest Form
        </h1>
        <p class="form-intro">
            Sign up to receive updates on tryouts, camps, and clinics. Fill out the form below and
            we'll be in touch with details as they become available.
        </p>
        <div class="form-wrap">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLScsIs-SPhTVDzo0_dPCSQOk5SHLZUUZHVt1sTEL30go0EepRw/viewform?embedded=true"
                width="100%"
                height="900"
                title="Clutch Baseball Player Interest Form">
                Loading form…
            </iframe>
        </div>
    </div>

    <footer>
        <div class="footer-ig">
            <a href="https://www.instagram.com/clutchbaseballacademy/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
            </a>
        </div>
    </footer>

</main>

<script>
    document.getElementById('menuBtn').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('open');
    });
</script>
</body>
</html>
